name: Test config input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          files: actions/hardened/crate-ci--typos/v1.47.2/tests/fixtures/clean/sample.txt
          config: actions/hardened/crate-ci--typos/v1.47.2/tests/fixtures/config/typos.toml
      - name: Assert action completed successfully with custom config
        run: |
          echo "Action completed without error when custom config is specified"
          echo "PASS"
