name: Test config input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          files: >-
            ${{ github.workspace }}/actions/hardened/crate-ci--typos/v1.44.0/tests/fixtures/sample-text/clean.txt
          config: >-
            ${{ github.workspace }}/actions/hardened/crate-ci--typos/v1.44.0/tests/fixtures/typos-config/_typos.toml
      - name: Assert action completed successfully with config input
        run: |
          echo "PASS: typos action ran with config input without errors"
