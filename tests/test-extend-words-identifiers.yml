name: Test extend_words and extend_identifiers inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          files: actions/hardened/crate-ci--typos/v1.47.2/tests/fixtures/clean/sample.txt
          extend_words: teh,ther
          extend_identifiers: Sochat,AttributeIDSupressMenu
      - name: Assert action completed successfully with extend inputs
        run: |
          echo "Action completed without error when extend_words and extend_identifiers are specified"
          echo "PASS"
