name: Test extend_identifiers and extend_words inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          files: "actions/hardened/crate-ci--typos/v1.46.1/tests/fixtures/sample.txt"
          extend_identifiers: "Sochat,Vanessa"
          extend_words: "typos,crate"
          isolated: "true"
      - name: Assert action completed successfully with extend inputs
        run: |
          echo "PASS: typos action ran with extend_identifiers and extend_words inputs without errors"
