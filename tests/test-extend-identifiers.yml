name: Test extend_identifiers input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a file with a word that needs to be whitelisted as identifier
        run: |
          mkdir -p /tmp/typos-test-ids
          # "Sochat" is a name that typos might flag; we extend identifiers to allow it
          echo "Author: Vanessa Sochat" > /tmp/typos-test-ids/authors.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-test-ids/authors.txt
          extend_identifiers: Sochat
      - name: Assert action succeeded with extend_identifiers
        run: |
          echo "PASS: typos action ran successfully with extend_identifiers input"
