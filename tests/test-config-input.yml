name: Test config input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file and custom config
        run: |
          mkdir -p /tmp/typos-config-test
          # Create a file with "teh" which is a known typo for "the"
          # The custom config will extend-words to allow it
          echo "# teh project" > /tmp/typos-config-test/readme.txt
          echo "This is a correctly spelled file." >> /tmp/typos-config-test/readme.txt
          # Create a custom typos config that allows "teh" as a valid word
          cat > /tmp/typos-config-test/typos.toml << 'EOF'
[default.extend-words]
teh = "teh"
EOF
      - id: action
        uses: .
        with:
          files: /tmp/typos-config-test/readme.txt
          config: /tmp/typos-config-test/typos.toml
      - name: Assert action succeeded with config input
        run: |
          echo "PASS: typos ran successfully with custom config input"
