name: Test extend_words input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file with correct spelling
        run: |
          mkdir -p /tmp/typos-words-test
          echo "This file contains only correctly spelled words." > /tmp/typos-words-test/content.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-words-test
          extend_words: "colour,flavour"
      - name: Assert action succeeded with extend_words input
        run: |
          echo "PASS: typos action ran successfully with extend_words input"
