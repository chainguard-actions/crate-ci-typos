name: Test extend_words input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test file with no typos
        run: |
          mkdir -p /tmp/typos-words-test
          # Use a clean file to verify extend_words doesn't break anything
          echo "The quick brown fox jumps over the lazy dog." > /tmp/typos-words-test/content.txt

      - id: action
        uses: .
        with:
          files: /tmp/typos-words-test/content.txt
          extend_words: "somecustomword,anotherword"

      - name: Assert action succeeded with extend_words
        run: |
          echo "PASS: typos action completed successfully with extend_words input"
