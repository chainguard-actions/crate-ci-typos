name: Test extend_identifiers and extend_words inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a text file with custom identifiers
        run: |
          mkdir -p /tmp/typos-extend-test
          # "Sochat" is a name that typos might flag; extend_identifiers allows it
          echo "Vanessa Sochat wrote this tool." > /tmp/typos-extend-test/authors.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-extend-test/authors.txt
          extend_identifiers: "Sochat"
          extend_words: "typos"
          isolated: "true"
      - name: Assert action completed successfully with extend inputs
        run: |
          echo "PASS: typos action ran with extend_identifiers and extend_words inputs without errors"
