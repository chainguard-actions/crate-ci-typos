name: Test extend_words input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run typos with extend_words
        id: action
        uses: .
        with:
          files: actions/hardened/crate-ci--typos/v1.46.1/tests/fixtures/sample.txt
          extend_words: "helo->hello"
      - name: Assert typos ran successfully
        run: |
          echo "PASS: typos completed with extend_words"
