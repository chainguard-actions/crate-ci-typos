name: Test extend_words input accepted
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a clean file to check
        run: |
          mkdir -p /tmp/typos-test
          echo "This is a clean file with correct spelling." > /tmp/typos-test/clean.txt

      - name: Run typos with extend_words input on clean file
        id: action
        uses: .
        with:
          files: /tmp/typos-test/clean.txt
          isolated: true
          extend_words: "someword"

      - name: Assert action passed
        run: |
          echo "PASS: typos action completed without errors when extend_words was provided"
