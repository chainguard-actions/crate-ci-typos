name: Test basic usage with files input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a file with correct spelling
        run: |
          mkdir -p /tmp/typos-test
          echo "This is a correctly spelled file." > /tmp/typos-test/good.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-test/good.txt
      - name: Assert action succeeded
        run: |
          echo "PASS: typos action ran successfully on files input"
