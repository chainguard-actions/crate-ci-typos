name: Test basic usage (no inputs)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a clean file to check
        run: |
          mkdir -p /tmp/typos-test
          echo "This is a clean file with no spelling errors." > /tmp/typos-test/clean.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-test/clean.txt
      - name: Assert action succeeded
        run: |
          echo "PASS: typos ran successfully on clean file"
