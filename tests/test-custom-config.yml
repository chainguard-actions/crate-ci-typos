name: Test custom config file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test file and custom config
        run: |
          mkdir -p /tmp/typos-test
          # "teh" is normally flagged as a typo for "the"
          echo "teh quick brown fox" > /tmp/typos-test/sample.txt

          # Create a custom typos config that marks "teh" as a valid word
          cat > /tmp/typos-config.toml << 'EOF'
          [default.extend-words]
          teh = "teh"
          EOF

      - name: Run typos with custom config that allows the word
        id: action
        uses: .
        with:
          files: /tmp/typos-test/sample.txt
          config: /tmp/typos-config.toml
          isolated: true

      - name: Assert action passed (custom config was applied)
        run: |
          echo "PASS: typos action completed without errors using custom config"
