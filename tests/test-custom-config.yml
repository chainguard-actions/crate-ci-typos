name: Test custom config input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a clean file to check
        run: |
          mkdir -p /tmp/typos-test
          echo "This is a clean file with no spelling errors." > /tmp/typos-test/config-test.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-test/config-test.txt
          config: ${{ github.workspace }}/actions/hardened/crate-ci--typos/v1.47.1/tests/fixtures/typos-config/typos.toml
      - name: Assert action succeeded
        run: |
          echo "PASS: typos action completed successfully with custom config"
