name: Test custom config file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test files and custom config
        run: |
          mkdir -p /tmp/typos-config-test
          # "teh" would normally be flagged as a typo for "the"
          # but we configure typos to ignore it via extend-words
          echo "teh quick brown fox" > /tmp/typos-config-test/content.txt
          # Create a typos config that allows "teh" as a valid word
          cat > /tmp/typos-config-test/typos.toml <<'EOF'
          [default.extend-words]
          teh = "teh"
          EOF

      - id: action
        uses: .
        with:
          files: /tmp/typos-config-test/content.txt
          config: /tmp/typos-config-test/typos.toml

      - name: Assert action succeeded with custom config
        run: |
          echo "PASS: typos action completed successfully with custom config that allows 'teh'"
