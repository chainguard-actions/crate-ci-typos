name: Test files input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a clean text file to check
        run: |
          mkdir -p /tmp/typos-files-test
          echo "The quick brown fox jumps over the lazy dog." > /tmp/typos-files-test/readme.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-files-test/readme.txt
          isolated: "true"
      - name: Assert action completed successfully with files input
        run: |
          echo "PASS: typos action ran with files input without errors"
