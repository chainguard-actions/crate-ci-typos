name: Test files input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test files with correct spelling
        run: |
          mkdir -p /tmp/typos-files-test
          echo "The quick brown fox jumps over the lazy dog." > /tmp/typos-files-test/file1.txt
          echo "Hello world, this is a test." > /tmp/typos-files-test/file2.txt
      - id: action
        uses: .
        with:
          files: /tmp/typos-files-test
      - name: Assert action succeeded with files input
        run: |
          echo "PASS: typos action ran successfully with files input"
